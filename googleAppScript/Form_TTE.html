<form id="tteForm" onsubmit="handleFormSubmit(event)" class="space-y-6">

    <div>
        <label class="block text-sm font-bold text-gray-700 mb-2">Nama Dokumen</label>
        <input type="text" name="namaDokumen" id="f_namaDokumen" required
            class="w-full border-gray-300 rounded-xl p-3 border focus:ring-2 focus:ring-indigo-500 outline-none transition"
            placeholder="Contoh: Surat Tugas Monitoring Madrasah">
    </div>

    <div class="p-5 bg-gray-50 rounded-2xl border border-gray-100">
        <label class="block text-sm font-bold text-gray-700 mb-3 flex items-center">
            <i class="fas fa-users-cog mr-2 text-indigo-500"></i> Pilih Pemaraf
        </label>
        <div class="grid grid-cols-2 gap-3">
            <label
                class="flex items-center space-x-2 p-3 bg-white rounded-xl border cursor-pointer hover:border-indigo-300 transition shadow-sm">
                <input type="checkbox" name="pemaraf" value="null" onchange="toggleParaf(this)"
                    class="w-4 h-4 text-indigo-600">
                <span class="text-sm font-medium text-gray-600">Tidak Diparaf</span>
            </label>
            <div id="paraf-list" class="contents"></div>
        </div>
    </div>

    <div id="penandatangan-container" class="space-y-4">
        <div class="p-5 border border-indigo-100 rounded-2xl bg-indigo-50/30">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label
                        class="block text-[10px] font-black text-indigo-600 uppercase tracking-widest mb-2">Penandatangan
                        1 (Wajib)</label>
                    <select name="p1" id="f_p1" required onchange="updateDropdowns()"
                        class="w-full p-3 rounded-xl border-white bg-white shadow-sm focus:ring-2 focus:ring-indigo-500 outline-none">
                        <option value="">-- Pilih Pejabat --</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[10px] font-black text-indigo-600 uppercase tracking-widest mb-2">Anchor
                        1</label>
                    <div id="anchor1-list" class="flex flex-wrap gap-2 mt-1"></div>
                </div>
            </div>
        </div>

        <div id="extra-signers" class="space-y-4"></div>

        <button type="button" onclick="addSignerField()" id="btnAddSigner"
            class="flex items-center text-sm font-bold text-indigo-600 hover:text-indigo-800 transition py-2 px-1">
            <i class="fas fa-plus-circle mr-2"></i> Tambah Penandatangan Lain (Opsional)
        </button>
    </div>

    <div class="pt-4 border-t border-gray-100">
        <label class="block text-sm font-bold text-gray-700 mb-3 flex items-center">
            <i class="fas fa-file-pdf mr-2 text-red-500"></i> Upload Dokumen PDF
        </label>
        <div class="relative group">
            <input type="file" id="fileInput" accept=".pdf" required
                class="block w-full text-sm text-gray-500 file:mr-4 file:py-3 file:px-6 file:rounded-xl file:border-0 file:text-sm file:font-bold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100 transition file:cursor-pointer cursor-pointer border-2 border-dashed border-gray-200 rounded-2xl p-4 group-hover:border-indigo-300">
        </div>
    </div>

    <div class="flex space-x-3 pt-4">
        <button type="button" onclick="closeModal()"
            class="flex-1 px-6 py-4 rounded-xl font-bold text-gray-500 hover:bg-gray-100 transition">
            Batal
        </button>
        <button type="submit" id="btnSimpan"
            class="flex-[2] bg-indigo-600 text-white font-bold py-4 rounded-xl hover:bg-indigo-700 transition shadow-lg shadow-indigo-200 flex items-center justify-center space-x-2">
            <i class="fas fa-paper-plane"></i>
            <span>Kirim Pengajuan</span>
        </button>
    </div>
</form>

<script>
    // Script ini diletakkan di sini atau digabung di Index.html (disarankan di sini agar modular)
    let masterPejabat = [];
    let currentSignerCount = 1;

    // 1. Inisialisasi Data dari Server
    function initForm() {
        google.script.run.withSuccessHandler(data => {
            masterPejabat = data.pejabat;
            renderParafList(data.pejabat);
            renderAnchorFields('anchor1-list', 'a1');
            updateDropdowns();
        }).getFormMasterData();
    }

    function renderParafList(pejabat) {
        const list = document.getElementById('paraf-list');
        list.innerHTML = pejabat.map(p => `
      <label class="flex items-center space-x-2 p-3 bg-white rounded-xl border cursor-pointer paraf-item hover:border-indigo-300 transition shadow-sm">
        <input type="checkbox" name="pemaraf" value="${p}" onchange="updateDropdowns()" class="w-4 h-4 text-indigo-600">
        <span class="text-sm font-medium text-gray-600">${p}</span>
      </label>
    `).join('');
    }

    function renderAnchorFields(targetId, name) {
        const anchors = ["$", "*", "#", "^"];
        document.getElementById(targetId).innerHTML = anchors.map(a => `
      <label class="inline-flex items-center px-3 py-2 bg-white border rounded-lg text-xs font-bold cursor-pointer hover:bg-indigo-50 transition">
        <input type="checkbox" name="${name}" value="${a}" class="mr-2"> ${a}
      </label>
    `).join('');
    }

    // 2. Logika Dinamis Penandatangan
    function addSignerField() {
        if (currentSignerCount >= 4) return;
        currentSignerCount++;

        const container = document.getElementById('extra-signers');
        const div = document.createElement('div');
        div.className = "p-5 border border-gray-100 rounded-2xl bg-gray-50/50 animate-in fade-in slide-in-from-top-2";
        div.innerHTML = `
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2">Penandatangan ${currentSignerCount}</label>
          <select name="p${currentSignerCount}" onchange="updateDropdowns()" 
            class="w-full p-3 rounded-xl border-gray-200 bg-white shadow-sm focus:ring-2 focus:ring-indigo-500 outline-none">
          </select>
        </div>
        <div>
          <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2">Anchor ${currentSignerCount}</label>
          <div id="anchor${currentSignerCount}-list" class="flex flex-wrap gap-2 mt-1"></div>
        </div>
      </div>
    `;
        container.appendChild(div);
        renderAnchorFields(`anchor${currentSignerCount}-list`, `a${currentSignerCount}`);
        updateDropdowns();

        if (currentSignerCount === 4) document.getElementById('btnAddSigner').classList.add('hidden');
    }

    function updateDropdowns() {
        const selectedParaf = Array.from(document.querySelectorAll('input[name="pemaraf"]:checked')).map(el => el.value);
        const allSelects = document.querySelectorAll('select[name^="p"]');
        const selectedSigners = Array.from(allSelects).map(s => s.value).filter(v => v !== "");

        allSelects.forEach(select => {
            const currentVal = select.value;
            const otherSelected = selectedSigners.filter(v => v !== currentVal);
            const available = masterPejabat.filter(p => !selectedParaf.includes(p) && !otherSelected.includes(p));

            let options = '<option value="">-- Pilih Pejabat --</option>';
            available.forEach(p => {
                options += `<option value="${p}" ${currentVal === p ? 'selected' : ''}>${p}</option>`;
            });
            select.innerHTML = options;
        });
    }

    function toggleParaf(el) {
        const otherParafs = document.querySelectorAll('.paraf-item');
        if (el.checked) {
            otherParafs.forEach(item => {
                item.classList.add('opacity-40', 'pointer-events-none');
                item.querySelector('input').checked = false;
            });
        } else {
            otherParafs.forEach(item => item.classList.remove('opacity-40', 'pointer-events-none'));
        }
        updateDropdowns();
    }

    // 3. Submit ke Server
    function handleFormSubmit(e) {
        e.preventDefault();
        const btn = document.getElementById('btnSimpan');
        const user = JSON.parse(localStorage.getItem('tte_user'));

        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-circle-notch fa-spin mr-2"></i> Mengupload Dokumen...';

        const file = document.getElementById('fileInput').files[0];
        const reader = new FileReader();

        reader.onload = function (f) {
            const getAnchors = (name) => Array.from(document.querySelectorAll(`input[name="${name}"]:checked`)).map(el => el.value);
            const pemaraf = Array.from(document.querySelectorAll('input[name="pemaraf"]:checked')).map(el => el.value);

            const payload = {
                namaDokumen: document.getElementById('f_namaDokumen').value,
                pemaraf: pemaraf,
                p1: document.getElementById('f_p1').value,
                a1: getAnchors('a1'),
                p2: document.querySelector('select[name="p2"]')?.value || "",
                a2: getAnchors('a2'),
                p3: document.querySelector('select[name="p3"]')?.value || "",
                a3: getAnchors('a3'),
                p4: document.querySelector('select[name="p4"]')?.value || "",
                a4: getAnchors('a4'),
                fileBase64: f.target.result.split(',')[1],
                fileType: file.type
            };

            google.script.run
                .withSuccessHandler(res => {
                    if (res.status === "success") {
                        Swal.fire('Berhasil!', 'Dokumen telah dikirim ke antrean.', 'success'); // Jika Anda pakai SweetAlert2
                        closeModal();
                        document.getElementById('tteForm').reset();
                        loadTTEList();
                    } else {
                        alert("Gagal: " + res.message);
                    }
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-paper-plane"></i> <span>Kirim Pengajuan</span>';
                })
                .withFailureHandler(err => {
                    alert("Error Server: " + err);
                    btn.disabled = false;
                })
                .saveSubmission(payload, user.nip);
        };
        reader.readAsDataURL(file);
    }

    // Jalankan init saat modal dibuka atau file ini diload
    initForm();
</script>
